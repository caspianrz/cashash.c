name: Documentation
description: Report a problem or suggest an improvement for the documentation
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the `cashash.c` documentation.

        Use this template for README, Doxygen comments, API docs, GitHub Pages, or release documentation issues.

  - type: textarea
    id: summary
    attributes:
      label: Documentation issue
      description: What is missing, unclear, incorrect, or outdated?
      placeholder: "Example: The ownership rules for inserted values are not clear."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Documentation area
      options:
        - README
        - Doxygen / API documentation
        - GitHub Pages
        - Release notes
        - SECURITY.md
        - Issue templates
        - Other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current documentation
      description: Paste or describe the current text, section, or page if relevant.
      placeholder: "Example: The README says..."

  - type: textarea
    id: suggested
    attributes:
      label: Suggested change
      description: What should be added, removed, clarified, or corrected?
      placeholder: "Example: Add a short section explaining that cashash.c copies keys but does not own values."
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: File, page, section, or URL where the documentation issue appears.
      placeholder: "README.md, include/cashash.h, docs/mainpage.md, GitHub Pages URL"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, links, examples, or related issues here.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked that this documentation issue has not already been reported.
          required: true
        - label: I described the documentation location or area.
          required: true
